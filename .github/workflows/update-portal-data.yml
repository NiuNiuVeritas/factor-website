name: Update portal data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: update-portal-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: [self-hosted, Windows, X64, guosen-data]
    timeout-minutes: 15
    defaults:
      run:
        shell: powershell

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-data.txt

      - name: Install data dependencies
        run: python -m pip install -r scripts/requirements-data.txt

      - name: Check database secrets
        env:
          GUOSEN_DB_URL: ${{ secrets.GUOSEN_DB_URL }}
          GUOSEN_DB_HOST: ${{ secrets.GUOSEN_DB_HOST }}
          GUOSEN_DB_USER: ${{ secrets.GUOSEN_DB_USER }}
          GUOSEN_DB_PASSWORD: ${{ secrets.GUOSEN_DB_PASSWORD }}
        run: |
          if ($env:GUOSEN_DB_URL) {
            Write-Host "Using GUOSEN_DB_URL."
            exit 0
          }

          $missing = @()
          if (-not $env:GUOSEN_DB_HOST) { $missing += "GUOSEN_DB_HOST" }
          if (-not $env:GUOSEN_DB_USER) { $missing += "GUOSEN_DB_USER" }
          if (-not $env:GUOSEN_DB_PASSWORD) { $missing += "GUOSEN_DB_PASSWORD" }

          if ($missing.Count -gt 0) {
            Write-Host "::error::Missing database secrets: $($missing -join ', '). Set GUOSEN_DB_URL, or set GUOSEN_DB_HOST, GUOSEN_DB_USER, and GUOSEN_DB_PASSWORD."
            exit 1
          }

          Write-Host "Using split database secrets."

      - name: Show runner public IP
        run: |
          Write-Host "Runner public IPv4:"
          Invoke-RestMethod -Uri "https://api.ipify.org"

      - name: Test database connection
        env:
          GUOSEN_DB_URL: ${{ secrets.GUOSEN_DB_URL }}
          GUOSEN_DB_HOST: ${{ secrets.GUOSEN_DB_HOST }}
          GUOSEN_DB_PORT: ${{ secrets.GUOSEN_DB_PORT }}
          GUOSEN_DB_NAME: ${{ secrets.GUOSEN_DB_NAME }}
          GUOSEN_DB_USER: ${{ secrets.GUOSEN_DB_USER }}
          GUOSEN_DB_PASSWORD: ${{ secrets.GUOSEN_DB_PASSWORD }}
        run: |
          @'
          from sqlalchemy import text
          from scripts.export_guosen_portal import get_database_engine

          engine = get_database_engine()
          with engine.connect() as connection:
              value = connection.execute(text("SELECT 1")).scalar()
          print(f"database connection ok: {value}")
          '@ | python -

      - name: Check required tables
        env:
          GUOSEN_DB_URL: ${{ secrets.GUOSEN_DB_URL }}
          GUOSEN_DB_HOST: ${{ secrets.GUOSEN_DB_HOST }}
          GUOSEN_DB_PORT: ${{ secrets.GUOSEN_DB_PORT }}
          GUOSEN_DB_NAME: ${{ secrets.GUOSEN_DB_NAME }}
          GUOSEN_DB_USER: ${{ secrets.GUOSEN_DB_USER }}
          GUOSEN_DB_PASSWORD: ${{ secrets.GUOSEN_DB_PASSWORD }}
        run: |
          @'
          from sqlalchemy import text
          from scripts.export_guosen_portal import get_database_engine

          required = {
              "portfolio_netvalue",
              "benchmark_netvalue",
              "portfolio_weight",
          }
          engine = get_database_engine()
          with engine.connect() as connection:
              tables = {
                  row[0]
                  for row in connection.execute(text("SHOW TABLES")).fetchall()
              }
          missing = sorted(required - tables)
          if missing:
              raise SystemExit(f"missing required tables: {', '.join(missing)}")
          print(f"required tables ok: {', '.join(sorted(required))}")
          '@ | python -

      - name: Export portal data
        env:
          GUOSEN_DB_URL: ${{ secrets.GUOSEN_DB_URL }}
          GUOSEN_DB_HOST: ${{ secrets.GUOSEN_DB_HOST }}
          GUOSEN_DB_PORT: ${{ secrets.GUOSEN_DB_PORT }}
          GUOSEN_DB_NAME: ${{ secrets.GUOSEN_DB_NAME }}
          GUOSEN_DB_USER: ${{ secrets.GUOSEN_DB_USER }}
          GUOSEN_DB_PASSWORD: ${{ secrets.GUOSEN_DB_PASSWORD }}
        run: python scripts/export_guosen_portal.py

      - name: Validate exported data
        run: |
          @'
          import json
          from pathlib import Path

          path = Path("public/data/portal/portal.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          assert data["strategies"], "strategies is empty"
          assert data["nav"], "nav is empty"
          assert data["annual"], "annual is empty"
          assert data["holdings"], "holdings is empty"
          assert len(data["reports"]) >= 60, "reports list looks incomplete"
          print(
              f"validated strategies={len(data['strategies'])} "
              f"nav={len(data['nav'])} annual={len(data['annual'])} "
              f"holdings={len(data['holdings'])} reports={len(data['reports'])}"
          )
          '@ | python -

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/portal/portal.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No data changes."
          } else {
            git commit -m "chore: refresh portal data"
            git push
          }
